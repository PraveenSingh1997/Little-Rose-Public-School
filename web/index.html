<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Little Rose Public School — School Management System powered by Flutter and Supabase.">
  <meta name="keywords" content="school management, little rose public school, students, teachers, attendance, exams">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Little Rose School">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta property="og:title" content="Little Rose Public School">
  <meta property="og:description" content="School Management System — Students, Teachers, Attendance, Exams and more.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <title>Little Rose Public School</title>
  <style>
    body {
      margin: 0; padding: 0;
      background-color: #3949AB;
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #splash { display: flex; flex-direction: column; align-items: center; gap: 20px; animation: fadeIn 0.4s ease-in; }
    #splash-icon { width: 80px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    #splash-icon svg { width: 44px; height: 44px; fill: white; }
    #splash-title { color: white; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; text-align: center; }
    #splash-sub { color: rgba(255,255,255,0.7); font-size: 13px; text-align: center; }
    #splash-spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7v2h20V7L12 2zm-1 4.27V5h2v1.27L12 6l-1 .27zM4 10v8H2v2h20v-2h-2v-8h-2v8h-2v-8h-2v8h-2v-8H8v8H6v-8H4z"/>
      </svg>
    </div>
    <div id="splash-title">Little Rose Public School</div>
    <div id="splash-sub">Loading school management system…</div>
    <div id="splash-spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var s = document.getElementById('splash');
      if (s) { s.style.transition = 'opacity 0.3s ease'; s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 300); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
