name: school_management
description: A comprehensive school management system powered by Supabase.
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^14.2.0

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

  # UI & charts
  fl_chart: ^0.68.0

  # PDF generation for report cards
  pdf: ^3.11.0
  printing: ^5.13.1

  # Image handling
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # OCR — fee receipt scanning (Android & iOS only; degrades gracefully on web/desktop)
  google_mlkit_text_recognition: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
